# ── Railway Deployment Configuration ─────────────────────────────────────
# Deploys the FastAPI backend from the Dockerfile.
# Railway auto-detects the Dockerfile and uses it for builds.
# ─────────────────────────────────────────────────────────────────────────

[build]
# Use the Dockerfile at repo root
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway injects $PORT automatically; uvicorn picks it up via CMD
startCommand = "uvicorn ontology_engine.api:app --host 0.0.0.0 --port ${PORT}"
healthcheckPath = "/"
healthcheckTimeout = 5
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
