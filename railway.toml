# ── Railway Deployment Configuration ─────────────────────────────────────
# Deploys the FastAPI backend from the Dockerfile.
# Railway auto-detects the Dockerfile and uses it for builds.
# ─────────────────────────────────────────────────────────────────────────

[build]
# Use the Dockerfile at repo root
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# No startCommand — the Dockerfile CMD (start.sh) handles startup
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
